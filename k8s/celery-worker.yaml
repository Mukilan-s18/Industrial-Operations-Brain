apiVersion: apps/v1
kind: Deployment
metadata:
  name: industrial-celery-worker
  namespace: industrial-brain
  labels:
    app: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: industrial-copilot-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "backend.celery_app", "worker", "--loglevel=info"]
          env:
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: industrial-secrets
                  key: GOOGLE_API_KEY
            - name: NEO4J_URI
              value: "bolt://neo4j:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: industrial-secrets
                  key: NEO4J_PASSWORD
            - name: POSTGRES_URI
              valueFrom:
                secretKeyRef:
                  name: industrial-secrets
                  key: POSTGRES_URI
            - name: REDIS_URI
              valueFrom:
                secretKeyRef:
                  name: industrial-secrets
                  key: REDIS_URI
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: industrial-secrets
                  key: REDIS_URI
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger:4317"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
