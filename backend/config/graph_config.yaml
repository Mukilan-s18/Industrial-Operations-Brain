# Configuration for Industrial Operations Brain NER Pipeline and Knowledge Graph Builder

# EntityRuler patterns for custom industrial NER
spacy_patterns:
  - label: "EQUIPMENT"
    pattern: [{"TEXT": {"REGEX": "^[A-Z]{1,3}-\\d{3,4}$"}}] # e.g., P-101, C-201
  - label: "EQUIPMENT"
    pattern: [{"LOWER": "pump"}, {"TEXT": {"REGEX": "^P-?\\d{3,4}$"}}] # e.g., Pump P-101, Pump P101
  - label: "EQUIPMENT"
    pattern: [{"LOWER": "compressor"}, {"TEXT": {"REGEX": "^C-?\\d{3,4}$"}}] # e.g., Compressor C-201
  - label: "REGULATION"
    pattern: [{"TEXT": {"REGEX": "^OISD-\\d{3}$"}}] # e.g., OISD-118
  - label: "REGULATION"
    pattern: [{"LOWER": "peso"}]
  - label: "REGULATION"
    pattern: [{"LOWER": "factory"}, {"LOWER": "act"}, {"TEXT": {"REGEX": "^\\d{4}$"}, "OP": "?"}]
  - label: "FAILURE_MODE"
    pattern: [{"LOWER": "seal"}, {"LOWER": "leak"}]
  - label: "FAILURE_MODE"
    pattern: [{"LOWER": "bearing"}, {"LOWER": "seizure"}]
  - label: "FAILURE_MODE"
    pattern: [{"LOWER": "dry"}, {"LOWER": "run"}]
  - label: "FAILURE_MODE"
    pattern: [{"LOWER": "mechanical"}, {"LOWER": "seal"}, {"LOWER": "degradation"}]
  - label: "FAILURE_MODE"
    pattern: [{"LOWER": "catastrophic"}, {"LOWER": "failure"}]
  - label: "PARAMETER"
    pattern: [{"LOWER": "discharge"}, {"LOWER": "pressure"}]
  - label: "PARAMETER"
    pattern: [{"LOWER": "bearing"}, {"LOWER": "temperature"}]
  - label: "PARAMETER"
    pattern: [{"LOWER": "vibration"}, {"LOWER": "level"}]
  - label: "PARAMETER_VALUE"
    pattern: [{"TEXT": {"REGEX": "^\\d+(\\.\\d+)?$"}}, {"LOWER": {"IN": ["bar", "c", "v", "psi"]}}]

# Manual override mappings for alias resolution
manual_mappings:
  "Pump P-101": "P-101"
  "Pump P101": "P-101"
  "P101": "P-101"
  "Pump P-102": "P-102"
  "Pump P102": "P-102"
  "P102": "P-102"
  "Compressor C-201": "C-201"
  "C201": "C-201"
  "OISD 118": "OISD-118"

# Blocklist overrides to prevent incorrect mergers
blocklist:
  "P-101": ["P-102", "Pump P-102", "P102"]
  "P-102": ["P-101", "Pump P-101", "P101"]

# Equipment type matching and default regulatory mappings
equipment_rules:
  - pattern: "^P-"
    type: "Pump"
    default_regulations:
      - id: "OISD-118"
        label: "REGULATION"
        clause: "Section 3.2"
        authority: "OISD"
      - id: "Factory Act"
        label: "REGULATION"
        clause: "Section 4"
        authority: "State Government"
  - pattern: "^C-"
    type: "Compressor"
    default_regulations:
      - id: "PESO"
        label: "REGULATION"
        clause: "Section 4"
        authority: "PESO"
      - id: "Factory Act"
        label: "REGULATION"
        clause: "Section 4"
        authority: "State Government"
  - pattern: "^V-"
    type: "Vessel"
    default_regulations:
      - id: "PESO"
        label: "REGULATION"
        clause: "Section 4"
        authority: "PESO"

# Equipment location rules
location_rules:
  - pattern: "102"
    location: "Utility Block B"
  - pattern: ".*"
    location: "Main Plant"

# Regulation metadata resolution rules
regulation_metadata:
  - pattern: "OISD"
    clause: "Section 3.2"
    authority: "OISD"
  - pattern: "PESO"
    clause: "Section 4"
    authority: "PESO"
  - pattern: "Factory Act"
    clause: "Section 4"
    authority: "State Government"
  - pattern: ".*"
    clause: "General"
    authority: "Government"
