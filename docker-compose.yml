version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: industrial-copilot-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: .
    container_name: industrial-copilot-backend
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=industrialpass
      - POSTGRES_URI=postgresql+asyncpg://postgres:postgres@postgres:5432/vectors
      - REDIS_URI=redis://redis:6379/0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_ENDPOINT_URL_S3=http://minio:9000
      - AWS_DEFAULT_REGION=us-east-1
      - PHOENIX_COLLECTOR_ENDPOINT=http://arize-phoenix:6006
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
      - jaeger
      - minio
      - arize-phoenix

  celery-worker:
    build: .
    container_name: industrial-copilot-celery-worker
    command: celery -A backend.celery_app worker --loglevel=info
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=industrialpass
      - POSTGRES_URI=postgresql+asyncpg://postgres:postgres@postgres:5432/vectors
      - REDIS_URI=redis://redis:6379/0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_ENDPOINT_URL_S3=http://minio:9000
      - AWS_DEFAULT_REGION=us-east-1
      - PHOENIX_COLLECTOR_ENDPOINT=http://arize-phoenix:6006
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
      - backend
      - jaeger
      - minio

  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    container_name: industrial-copilot-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend

  neo4j:
    image: neo4j:5-community
    container_name: industrial-copilot-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/industrialpass
    volumes:
      - ./neo4j_data:/data
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: industrial-copilot-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=vectors
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: industrial-copilot-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: industrial-copilot-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
    restart: unless-stopped

  arize-phoenix:
    image: arizeai/phoenix:latest
    container_name: industrial-copilot-phoenix
    ports:
      - "6006:6006"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: industrial-copilot-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: industrial-copilot-grafana
    ports:
      - "3001:3000"
    restart: unless-stopped
